services:
  scraper:
    build:
      context: ./AIOWebScraper
      dockerfile: ScraperWorker/Dockerfile
    command: ["dotnet", "AIOWebScraper.Agent.dll", "--dedicated-mode"]
    deploy:
      replicas: 5
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  scraper-lb:
    image: nginx:alpine
    ports:
      - "7126:7126"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - scraper
