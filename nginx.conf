events {
    worker_connections 1024;
}

http {
    upstream scrapers {
        server scraper:5000;
    }

    server {
        listen 7126;

        location / {
            proxy_pass http://scrapers;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
