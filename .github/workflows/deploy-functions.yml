name: Deploy Azure Functions

on:
  push:
    branches:
      - master
      - azure-functions-migration
    paths:
      - 'AIOMarketMaker.Functions/**'
      - 'AIOMarketMaker.Core/**'
      - '.github/workflows/deploy-functions.yml'
      - '.github/infrastructure/**'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'AIOMarketMaker.Functions'
  DOTNET_VERSION: '8.0.x'
  RESOURCE_GROUP: 'rg-aiomarketmaker-dev'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: AIOMarketMaker

      - name: Checkout AIOWebScraper
        uses: actions/checkout@v4
        with:
          repository: private/EXTERNAL_SCRAPER_REPO
          path: AIOWebScraper
          token: ${{ secrets.GH_PAT }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore AIOMarketMaker/AIOMarketMaker.sln

      - name: Build solution
        run: dotnet build AIOMarketMaker/AIOMarketMaker.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test AIOMarketMaker/AIOMarketMaker.Tests/AIOMarketMaker.Tests.csproj --configuration Release --no-build --verbosity normal --filter "Category!=Integration"
        continue-on-error: true

      - name: Publish Functions project
        run: dotnet publish AIOMarketMaker/${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/AIOMarketMaker.Functions.csproj --configuration Release --runtime win-x86 --self-contained false --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-app
          path: ./publish
          if-no-files-found: error

  deploy-infrastructure:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      functionAppName: ${{ steps.deploy.outputs.functionAppName }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location westus2 \
            --tags Environment=dev Application=aiomarketmaker

      - name: Deploy Infrastructure
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: ./.github/infrastructure/main.bicep
          parameters: >
            environment=dev
            sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD }}
            openAiApiKey=${{ vars.OPENAI_API_KEY }}
            pineconeApiKey=${{ vars.PINECONE_API_KEY }}
            pineconeIndexName=${{ vars.PINECONE_INDEX_NAME }}
            scraperApiBaseUrl=${{ vars.SCRAPER_API_BASE_URL }}
            scraperApiKey=${{ vars.SCRAPER_API_KEY }}
          failOnStdErr: false

  deploy-code:
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: function-app
          path: ./publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ needs.deploy-infrastructure.outputs.functionAppName }}
          package: ./publish

      - name: Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Function App:** ${{ needs.deploy-infrastructure.outputs.functionAppName }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Resource Group:** ${{ env.RESOURCE_GROUP }}" >> $GITHUB_STEP_SUMMARY
