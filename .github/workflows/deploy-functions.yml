name: Deploy Azure Functions

on:
  push:
    branches:
      - master
      - azure-functions-migration
    paths:
      - 'AIOMarketMaker.Functions/**'
      - 'AIOMarketMaker.Core/**'
      - 'AIOMarketMaker.MigrationCli/**'
      - '.github/workflows/deploy-functions.yml'
      - '.github/infrastructure/**'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  RESOURCE_GROUP: 'rg-aiomarketmaker-dev'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: AIOMarketMaker

      - name: Checkout AIOWebScraper
        uses: actions/checkout@v4
        with:
          repository: private/EXTERNAL_SCRAPER_REPO
          path: AIOWebScraper
          token: ${{ secrets.GH_PAT }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore and publish Functions project
        run: dotnet publish AIOMarketMaker/AIOMarketMaker.Functions/AIOMarketMaker.Functions.csproj --configuration Release --output ./publish-functions

      - name: Restore and publish Migration CLI
        run: dotnet publish AIOMarketMaker/AIOMarketMaker.MigrationCli/AIOMarketMaker.MigrationCli.csproj --configuration Release --output ./publish-migrations

      - name: Upload Functions artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-app
          path: ./publish-functions
          if-no-files-found: error

      - name: Upload Migration CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: migration-cli
          path: ./publish-migrations
          if-no-files-found: error

  deploy-infrastructure:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      functionAppName: ${{ steps.deploy.outputs.functionAppName }}
      sqlServerFqdn: ${{ steps.deploy.outputs.sqlServerFqdn }}
      sqlDatabaseName: ${{ steps.deploy.outputs.sqlDatabaseName }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location westus2 \
            --tags Environment=dev Application=aiomarketmaker

      - name: Deploy Infrastructure
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: ./.github/infrastructure/main.bicep
          parameters: >
            environment=dev
            sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD }}
            openAiApiKey=${{ vars.OPENAI_API_KEY }}
            pineconeApiKey=${{ vars.PINECONE_API_KEY }}
            pineconeIndexName=${{ vars.PINECONE_INDEX_NAME }}
            scraperApiBaseUrl=${{ vars.SCRAPER_API_BASE_URL }}
            scraperApiKey=${{ vars.SCRAPER_API_KEY }}
          failOnStdErr: false

  deploy-migrations:
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    steps:
      - name: Download Migration CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: migration-cli
          path: ./migration-cli

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run Migrations
        env:
          SQL_CONNECTION_STRING: "Server=tcp:${{ needs.deploy-infrastructure.outputs.sqlServerFqdn }},1433;Initial Catalog=${{ needs.deploy-infrastructure.outputs.sqlDatabaseName }};Persist Security Info=False;User ID=sqladmin;Password=${{ secrets.SQL_ADMIN_PASSWORD }};MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"
        run: |
          echo "Running database migrations..."
          dotnet ./migration-cli/AIOMarketMaker.MigrationCli.dll --connection "$SQL_CONNECTION_STRING"

      - name: Migration Summary
        run: |
          echo "## Database Migrations" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** ${{ needs.deploy-infrastructure.outputs.sqlServerFqdn }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Database:** ${{ needs.deploy-infrastructure.outputs.sqlDatabaseName }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Completed" >> $GITHUB_STEP_SUMMARY

  deploy-code:
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure, deploy-migrations]
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: function-app
          path: ./publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create deployment package
        run: |
          cd ./publish
          zip -r ../deploy.zip .
          cd ..
          ls -la deploy.zip

      - name: Deploy using Azure CLI
        run: |
          az functionapp deployment source config-zip \
            --name ${{ needs.deploy-infrastructure.outputs.functionAppName }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --src deploy.zip

      - name: Restart Function App
        run: |
          az functionapp restart \
            --name ${{ needs.deploy-infrastructure.outputs.functionAppName }} \
            --resource-group ${{ env.RESOURCE_GROUP }}

      - name: Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Function App:** ${{ needs.deploy-infrastructure.outputs.functionAppName }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Resource Group:** ${{ env.RESOURCE_GROUP }}" >> $GITHUB_STEP_SUMMARY
