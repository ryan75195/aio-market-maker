name: Deploy Azure Functions

on:
  push:
    branches:
      - master
      - azure-functions-migration
    paths:
      - 'AIOMarketMaker.Functions/**'
      - 'AIOMarketMaker.Core/**'
      - '.github/workflows/deploy-functions.yml'
      - '.github/infrastructure/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'AIOMarketMaker.Functions'
  DOTNET_VERSION: '8.0.x'
  RESOURCE_GROUP: 'rg-aiomarketmaker-${{ github.event.inputs.environment || 'dev' }}'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore AIOMarketMaker.sln

      - name: Build solution
        run: dotnet build AIOMarketMaker.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test AIOMarketMaker.Tests/AIOMarketMaker.Tests.csproj --configuration Release --no-build --verbosity normal --filter "Category!=Integration"

      - name: Publish Functions project
        run: dotnet publish ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/AIOMarketMaker.Functions.csproj --configuration Release --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-app
          path: ./publish
          if-no-files-found: error

  deploy-infrastructure:
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      functionAppName: ${{ steps.deploy.outputs.functionAppName }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location eastus \
            --tags Environment=${{ github.event.inputs.environment || 'dev' }} Application=aiomarketmaker

      - name: Deploy Infrastructure
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: .github/infrastructure/main.bicep
          parameters: >
            environment=${{ github.event.inputs.environment || 'dev' }}
            sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD }}
            openAiApiKey=${{ vars.OPENAI_API_KEY }}
            pineconeApiKey=${{ vars.PINECONE_API_KEY }}
            pineconeIndexName=${{ vars.PINECONE_INDEX_NAME }}
            scraperApiBaseUrl=${{ vars.SCRAPER_API_BASE_URL }}
            scraperApiKey=${{ vars.SCRAPER_API_KEY }}
          failOnStdErr: false

  deploy-code:
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: function-app
          path: ./publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ needs.deploy-infrastructure.outputs.functionAppName }}
          package: ./publish

      - name: Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ github.event.inputs.environment || 'dev' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Function App:** ${{ needs.deploy-infrastructure.outputs.functionAppName }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Resource Group:** ${{ env.RESOURCE_GROUP }}" >> $GITHUB_STEP_SUMMARY
