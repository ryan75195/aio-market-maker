<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Market Maker - Logo Options</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    padding: 40px;
  }
  h1 { text-align: center; margin-bottom: 12px; font-size: 24px; color: #888; }
  p.subtitle { text-align: center; color: #555; margin-bottom: 48px; font-size: 14px; }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .option {
    background: #111;
    border: 1px solid #222;
    border-radius: 16px;
    padding: 48px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .option:hover { border-color: #333; }
  .option h2 { font-size: 14px; color: #666; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; }
  .light-bg {
    background: #f5f5f5;
    border-radius: 8px;
    padding: 32px;
    width: 100%;
    display: flex;
    justify-content: center;
  }
  .sizes { display: flex; gap: 32px; align-items: flex-end; }
  .sizes .size-label { font-size: 11px; color: #555; text-align: center; }
</style>
</head>
<body>

<h1>Market Maker Logo Options</h1>
<p class="subtitle">Tech/data-driven - Blue/cyan palette - Dark &amp; light backgrounds</p>

<div class="grid">

<!-- Option A: Price Signal Mark -->
<div class="option">
  <h2>Option A - Price Signal</h2>
  <svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
    <!-- Icon: stylized candlestick/price arrow -->
    <defs>
      <linearGradient id="a-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#00b4d8"/>
        <stop offset="100%" stop-color="#0077b6"/>
      </linearGradient>
    </defs>
    <!-- Three ascending bars with arrow -->
    <rect x="4" y="48" width="8" height="24" rx="2" fill="#0077b6" opacity="0.5"/>
    <rect x="16" y="34" width="8" height="38" rx="2" fill="#0090c4" opacity="0.7"/>
    <rect x="28" y="18" width="8" height="54" rx="2" fill="#00b4d8"/>
    <!-- Upward arrow from top of tallest bar -->
    <path d="M32 18 L32 8 L27 14 M32 8 L37 14" stroke="url(#a-grad)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Text -->
    <text x="52" y="36" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="700" fill="#e8e8e8" letter-spacing="-0.5">Market</text>
    <text x="52" y="62" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="300" fill="#00b4d8" letter-spacing="-0.5">Maker</text>
  </svg>
  <!-- Light version -->
  <div class="light-bg">
    <svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="a-grad-l" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#0077b6"/>
          <stop offset="100%" stop-color="#005f8a"/>
        </linearGradient>
      </defs>
      <rect x="4" y="48" width="8" height="24" rx="2" fill="#0077b6" opacity="0.35"/>
      <rect x="16" y="34" width="8" height="38" rx="2" fill="#0077b6" opacity="0.6"/>
      <rect x="28" y="18" width="8" height="54" rx="2" fill="#0077b6"/>
      <path d="M32 18 L32 8 L27 14 M32 8 L37 14" stroke="url(#a-grad-l)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="52" y="36" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="700" fill="#1a1a1a" letter-spacing="-0.5">Market</text>
      <text x="52" y="62" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="300" fill="#0077b6" letter-spacing="-0.5">Maker</text>
    </svg>
  </div>
</div>

<!-- Option B: Crosshair/Target -->
<div class="option">
  <h2>Option B - Crosshair</h2>
  <svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="b-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#00d4ff"/>
        <stop offset="100%" stop-color="#0077b6"/>
      </linearGradient>
    </defs>
    <!-- Crosshair icon -->
    <circle cx="24" cy="40" r="16" stroke="url(#b-grad)" stroke-width="2.5" fill="none"/>
    <circle cx="24" cy="40" r="6" fill="url(#b-grad)"/>
    <line x1="24" y1="18" x2="24" y2="26" stroke="url(#b-grad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="24" y1="54" x2="24" y2="62" stroke="url(#b-grad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="2" y1="40" x2="10" y2="40" stroke="url(#b-grad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="38" y1="40" x2="46" y2="40" stroke="url(#b-grad)" stroke-width="2" stroke-linecap="round"/>
    <!-- Text -->
    <text x="58" y="36" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="700" fill="#e8e8e8" letter-spacing="-0.5">Market</text>
    <text x="58" y="62" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="300" fill="#00d4ff" letter-spacing="-0.5">Maker</text>
  </svg>
  <div class="light-bg">
    <svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="b-grad-l" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#0077b6"/>
          <stop offset="100%" stop-color="#005f8a"/>
        </linearGradient>
      </defs>
      <circle cx="24" cy="40" r="16" stroke="url(#b-grad-l)" stroke-width="2.5" fill="none"/>
      <circle cx="24" cy="40" r="6" fill="url(#b-grad-l)"/>
      <line x1="24" y1="18" x2="24" y2="26" stroke="url(#b-grad-l)" stroke-width="2" stroke-linecap="round"/>
      <line x1="24" y1="54" x2="24" y2="62" stroke="url(#b-grad-l)" stroke-width="2" stroke-linecap="round"/>
      <line x1="2" y1="40" x2="10" y2="40" stroke="url(#b-grad-l)" stroke-width="2" stroke-linecap="round"/>
      <line x1="38" y1="40" x2="46" y2="40" stroke="url(#b-grad-l)" stroke-width="2" stroke-linecap="round"/>
      <text x="58" y="36" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="700" fill="#1a1a1a" letter-spacing="-0.5">Market</text>
      <text x="58" y="62" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="300" fill="#0077b6" letter-spacing="-0.5">Maker</text>
    </svg>
  </div>
</div>

<!-- Option C: Network/Nodes -->
<div class="option">
  <h2>Option C - Network</h2>
  <svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="c-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#48cae4"/>
        <stop offset="100%" stop-color="#0077b6"/>
      </linearGradient>
    </defs>
    <!-- Connecting lines -->
    <line x1="8" y1="24" x2="24" y2="40" stroke="#0077b6" stroke-width="1.5" opacity="0.4"/>
    <line x1="8" y1="56" x2="24" y2="40" stroke="#0077b6" stroke-width="1.5" opacity="0.4"/>
    <line x1="24" y1="40" x2="44" y2="28" stroke="#00b4d8" stroke-width="1.5" opacity="0.6"/>
    <line x1="24" y1="40" x2="44" y2="52" stroke="#00b4d8" stroke-width="1.5" opacity="0.6"/>
    <!-- Nodes -->
    <circle cx="8" cy="24" r="4" fill="#0077b6" opacity="0.5"/>
    <circle cx="8" cy="56" r="4" fill="#0077b6" opacity="0.5"/>
    <circle cx="24" cy="40" r="6" fill="url(#c-grad)"/>
    <circle cx="44" cy="28" r="4" fill="#48cae4" opacity="0.7"/>
    <circle cx="44" cy="52" r="4" fill="#48cae4" opacity="0.7"/>
    <!-- Text -->
    <text x="60" y="36" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="700" fill="#e8e8e8" letter-spacing="-0.5">Market</text>
    <text x="60" y="62" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="300" fill="#48cae4" letter-spacing="-0.5">Maker</text>
  </svg>
  <div class="light-bg">
    <svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="c-grad-l" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#0077b6"/>
          <stop offset="100%" stop-color="#005f8a"/>
        </linearGradient>
      </defs>
      <line x1="8" y1="24" x2="24" y2="40" stroke="#0077b6" stroke-width="1.5" opacity="0.3"/>
      <line x1="8" y1="56" x2="24" y2="40" stroke="#0077b6" stroke-width="1.5" opacity="0.3"/>
      <line x1="24" y1="40" x2="44" y2="28" stroke="#0077b6" stroke-width="1.5" opacity="0.5"/>
      <line x1="24" y1="40" x2="44" y2="52" stroke="#0077b6" stroke-width="1.5" opacity="0.5"/>
      <circle cx="8" cy="24" r="4" fill="#0077b6" opacity="0.35"/>
      <circle cx="8" cy="56" r="4" fill="#0077b6" opacity="0.35"/>
      <circle cx="24" cy="40" r="6" fill="url(#c-grad-l)"/>
      <circle cx="44" cy="28" r="4" fill="#0077b6" opacity="0.6"/>
      <circle cx="44" cy="52" r="4" fill="#0077b6" opacity="0.6"/>
      <text x="60" y="36" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="700" fill="#1a1a1a" letter-spacing="-0.5">Market</text>
      <text x="60" y="62" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="300" fill="#0077b6" letter-spacing="-0.5">Maker</text>
    </svg>
  </div>
</div>

<!-- Option D: Diamond/Gem -->
<div class="option">
  <h2>Option D - Diamond</h2>
  <svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="d-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#90e0ef"/>
        <stop offset="40%" stop-color="#00b4d8"/>
        <stop offset="100%" stop-color="#0077b6"/>
      </linearGradient>
      <linearGradient id="d-grad2" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#00b4d8" stop-opacity="0.8"/>
        <stop offset="100%" stop-color="#023e8a" stop-opacity="0.9"/>
      </linearGradient>
    </defs>
    <!-- Diamond shape with facets -->
    <path d="M24 8 L42 30 L24 72 L6 30 Z" fill="url(#d-grad)" opacity="0.9"/>
    <path d="M24 8 L42 30 L24 72 Z" fill="url(#d-grad2)" opacity="0.4"/>
    <path d="M6 30 L42 30" stroke="#90e0ef" stroke-width="0.8" opacity="0.6"/>
    <path d="M24 8 L24 72" stroke="#90e0ef" stroke-width="0.5" opacity="0.3"/>
    <!-- Text -->
    <text x="54" y="36" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="700" fill="#e8e8e8" letter-spacing="-0.5">Market</text>
    <text x="54" y="62" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="300" fill="#00b4d8" letter-spacing="-0.5">Maker</text>
  </svg>
  <div class="light-bg">
    <svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="d-grad-l" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#48cae4"/>
          <stop offset="40%" stop-color="#0077b6"/>
          <stop offset="100%" stop-color="#023e8a"/>
        </linearGradient>
        <linearGradient id="d-grad2-l" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#0077b6" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#023e8a" stop-opacity="0.8"/>
        </linearGradient>
      </defs>
      <path d="M24 8 L42 30 L24 72 L6 30 Z" fill="url(#d-grad-l)" opacity="0.9"/>
      <path d="M24 8 L42 30 L24 72 Z" fill="url(#d-grad2-l)" opacity="0.4"/>
      <path d="M6 30 L42 30" stroke="#0077b6" stroke-width="0.8" opacity="0.4"/>
      <path d="M24 8 L24 72" stroke="#0077b6" stroke-width="0.5" opacity="0.2"/>
      <text x="54" y="36" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="700" fill="#1a1a1a" letter-spacing="-0.5">Market</text>
      <text x="54" y="62" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="300" fill="#0077b6" letter-spacing="-0.5">Maker</text>
    </svg>
  </div>
</div>

</div>

</body>
</html>
