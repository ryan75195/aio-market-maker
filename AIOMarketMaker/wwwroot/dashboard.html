<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eBay ETL Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/api/static/css/dashboard.css">
</head>
<body>
    <div class="container">
        <h1>eBay ETL Dashboard</h1>

        <div id="message" class="message"></div>

        <!-- Tab Navigation -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('dashboard')">Dashboard</button>
            <button class="tab" onclick="switchTab('jobs')">Jobs</button>
            <button class="tab" onclick="switchTab('products')">Products</button>
        </div>

        <!-- Dashboard Tab -->
        <div id="dashboard-tab" class="tab-content active">
            <div class="stats" id="dashboardStats">
                <div class="stat-card"><div class="value">-</div><div class="label">Loading...</div></div>
            </div>

            <div class="charts-grid">
                <div class="chart-card">
                    <h3>Price Distribution</h3>
                    <div class="chart-container"><canvas id="priceChart"></canvas></div>
                </div>
                <div class="chart-card">
                    <h3>Sales Over Time (Last 30 Days)</h3>
                    <div class="chart-container"><canvas id="salesChart"></canvas></div>
                </div>
                <div class="chart-card">
                    <h3>Revenue by Search Term</h3>
                    <div class="chart-container"><canvas id="revenueChart"></canvas></div>
                </div>
                <div class="chart-card">
                    <h3>Products per Job</h3>
                    <div class="chart-container"><canvas id="jobsChart"></canvas></div>
                </div>
            </div>
        </div>

        <!-- Jobs Tab -->
        <div id="jobs-tab" class="tab-content">
            <h2>
                Scrape Jobs
                <button class="btn btn-primary" onclick="toggleAddForm()">+ Add Job</button>
                <button class="btn btn-success" onclick="runAllJobs()" style="margin-left: 10px;">Run All Enabled</button>
            </h2>

            <div id="addJobForm" class="add-job-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Search Term *</label>
                        <input type="text" id="searchTerm" placeholder="e.g. iPhone 15 Pro" style="width: 250px;">
                    </div>
                    <div class="form-group">
                        <label>Search Type</label>
                        <select id="searchType">
                            <option value="SOLD">Sold Listings</option>
                            <option value="ACTIVE">Active Listings</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Buying Format</label>
                        <select id="buyingFormat">
                            <option value="BUY_NOW">Buy It Now</option>
                            <option value="AUCTION">Auction</option>
                            <option value="ALL">All</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Condition</label>
                        <select id="condition">
                            <option value="USED">Used</option>
                            <option value="NEW">New</option>
                            <option value="ALL">All</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Frequency (minutes)</label>
                        <input type="number" id="frequencyMinutes" value="60" style="width: 100px;">
                    </div>
                    <div class="form-group">
                        <label>Lookback Days</label>
                        <input type="number" id="lookbackDays" value="7" style="width: 100px;">
                    </div>
                    <div class="form-group">
                        <label>Item Limit</label>
                        <input type="number" id="itemLimit" placeholder="100" style="width: 100px;">
                    </div>
                    <div class="form-group" style="justify-content: flex-end;">
                        <button class="btn btn-success" onclick="createJob()">Create Job</button>
                    </div>
                </div>
            </div>

            <div id="jobsList">
                <!-- Jobs will be injected here by the server -->
                {{JOBS_LIST}}
            </div>
        </div>

        <!-- Products Tab -->
        <div id="products-tab" class="tab-content">
            <h2>Products</h2>

            <div class="filter-bar">
                <div class="form-group">
                    <label>Status</label>
                    <select id="filterStatus" onchange="loadProducts(1)">
                        <option value="">All</option>
                        <option value="Sold">Sold</option>
                        <option value="Active">Active</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Job</label>
                    <select id="filterJob" onchange="loadProducts(1)">
                        <option value="">All Jobs</option>
                        {{JOB_OPTIONS}}
                    </select>
                </div>
                <div class="form-group">
                    <label>Search</label>
                    <input type="text" id="filterSearch" placeholder="Search titles..." style="width: 200px;" onkeyup="debounceSearch()">
                </div>
                <div class="form-group">
                    <label>Page Size</label>
                    <select id="pageSize" onchange="loadProducts(1)">
                        <option value="25">25</option>
                        <option value="50" selected>50</option>
                        <option value="100">100</option>
                    </select>
                </div>
            </div>

            <table id="productsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Listing ID</th>
                        <th>Title</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th>Condition</th>
                        <th>Job</th>
                        <th>End Date</th>
                    </tr>
                </thead>
                <tbody id="productsBody">
                    <tr><td colspan="8" style="text-align: center; padding: 40px;">Loading products...</td></tr>
                </tbody>
            </table>

            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <!-- Data element for passing server data to JavaScript -->
    <div id="jobsData" data-jobs="{{JOBS_JSON}}" style="display: none;"></div>

    <script src="/api/static/js/dashboard.js"></script>
</body>
</html>
